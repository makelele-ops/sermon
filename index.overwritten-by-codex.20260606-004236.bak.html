<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="6일 말씀 묵상 여정" />
    <title>매일 말씀 묵상</title>
    <style>
:root {
  color-scheme: light;
  --bg: #fff8ed;
  --panel: #fffdf7;
  --panel-2: #f7ead8;
  --ink: #302315;
  --muted: #7b6c58;
  --line: rgba(126, 86, 41, 0.16);
  --accent: #2f806b;
  --gold: #b77716;
  --ring: rgba(183, 119, 22, 0.24);
  --shadow: 0 24px 64px rgba(101, 64, 27, 0.16);
  --radius: 8px;
  --serif: "Batang", "Nanum Myeongjo", Georgia, serif;
  --sans: "Malgun Gothic", "Apple SD Gothic Neo", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

* {
  box-sizing: border-box;
}

html,
body {
  overflow-x: hidden;
}

body {
  margin: 0;
  min-width: 320px;
  background:
    radial-gradient(circle at 18% 0%, rgba(246, 196, 104, 0.3), transparent 26%),
    radial-gradient(circle at 88% 18%, rgba(116, 184, 156, 0.22), transparent 26%),
    linear-gradient(180deg, #fffaf1 0%, #fff4e4 52%, #fff8ed 100%),
    var(--bg);
  color: var(--ink);
  font-family: var(--sans);
}

button,
textarea,
input {
  font: inherit;
}

button {
  cursor: pointer;
}

svg {
  width: 1em;
  height: 1em;
  fill: none;
  stroke: currentColor;
  stroke-linecap: round;
  stroke-linejoin: round;
  stroke-width: 2;
}

.app-shell {
  min-height: 100vh;
  background: var(--bg);
}

.screen {
  min-height: 100vh;
  animation: pageIn 360ms cubic-bezier(0.2, 0.7, 0.2, 1) backwards;
}

.screen.open {
  animation-name: openIn;
}

.screen.back {
  animation-name: backIn;
}

.screen.slide-left {
  animation-name: slideLeftIn;
}

.screen.slide-right {
  animation-name: slideRightIn;
}

.hero {
  position: relative;
  overflow: hidden;
  min-height: 278px;
  padding: 18px 22px 28px;
  background-image:
    linear-gradient(90deg, rgba(255, 248, 237, 0.9) 0%, rgba(255, 248, 237, 0.48) 48%, rgba(255, 248, 237, 0.84) 100%),
    linear-gradient(180deg, rgba(255, 248, 237, 0.12), var(--bg)),
    var(--hero-image);
  background-position: center 46%;
  background-size: cover;
  border-bottom: 1px solid rgba(126, 86, 41, 0.1);
}

.hero-copy {
  width: min(1480px, 100%);
  margin: 0 auto;
}

.sermon-date,
.section-heading p,
.day-pill,
.verse-block span,
.reflection-grid span,
.journal-head p {
  color: var(--gold);
  font-size: 0.86rem;
  font-weight: 700;
  letter-spacing: 0.02em;
}

.sermon-date {
  margin: 0 0 12px;
}

.hero h1 {
  max-width: 1160px;
  margin: 0 0 22px;
  font-family: var(--serif);
  font-size: clamp(3.6rem, 5vw, 6rem);
  font-weight: 500;
  line-height: 0.95;
  letter-spacing: 0;
  color: #2f2418;
  text-shadow: 0 2px 24px rgba(255, 255, 255, 0.62);
  word-break: keep-all;
}

.passage {
  margin: 0 0 38px;
  color: #5f523f;
  font-size: 0.94rem;
  font-weight: 500;
}

.hero-progress,
.detail-bottom,
.detail-nav,
.journal-head,
.prayer-line {
  display: flex;
  align-items: center;
}

.hero-progress {
  gap: 16px;
  width: min(430px, 100%);
  color: #5f523f;
  font-size: 0.92rem;
}

.progress-track {
  position: relative;
  flex: 1;
  min-width: 0;
  height: 1px;
  overflow: hidden;
  background: rgba(126, 86, 41, 0.2);
}

.progress-track span {
  position: absolute;
  inset: 0 auto 0 0;
  background: var(--gold);
}

.journey {
  width: min(1480px, calc(100% - 40px));
  margin: 0 auto;
  padding: 56px 0 76px;
}

.section-heading {
  margin-bottom: 20px;
}

.section-heading p {
  margin: 0;
}

.card-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 16px;
}

.day-card {
  position: relative;
  overflow: hidden;
  min-height: 278px;
  border: 1px solid color-mix(in srgb, var(--accent), transparent 72%);
  border-radius: var(--radius);
  padding: 0;
  color: var(--ink);
  background: #fffdf7;
  text-align: left;
  box-shadow: 0 18px 46px rgba(92, 61, 28, 0.13);
}

.day-card::before,
.day-card::after {
  position: absolute;
  inset: 0;
  content: "";
}

.day-card::before {
  background-image: var(--image);
  background-position: center;
  background-size: cover;
  filter: brightness(1.04) saturate(1.08) contrast(1.02);
  transform: scale(1.01);
  transition: transform 220ms ease;
}

.day-card::after {
  background:
    linear-gradient(180deg, rgba(255, 251, 244, 0) 0%, rgba(255, 251, 244, 0.08) 40%, rgba(255, 251, 244, 0.78) 68%, rgba(255, 251, 244, 0.98) 100%),
    linear-gradient(90deg, rgba(255, 248, 235, 0.18), rgba(255, 248, 235, 0.02));
}

.day-card:hover::before {
  transform: scale(1.05);
}

.day-card:hover {
  border-color: var(--accent);
  box-shadow: 0 24px 58px rgba(92, 61, 28, 0.18);
}

.check-badge {
  position: absolute;
  z-index: 2;
  top: 14px;
  right: 14px;
  display: grid;
  place-items: center;
  width: 30px;
  height: 30px;
  border-radius: 999px;
  color: var(--accent);
  border: 1px solid color-mix(in srgb, var(--accent), transparent 42%);
  background: rgba(255, 253, 247, 0.92);
  box-shadow: 0 8px 24px rgba(92, 61, 28, 0.16);
  backdrop-filter: blur(10px);
}

.card-copy {
  position: absolute;
  z-index: 2;
  left: 0;
  right: 0;
  bottom: 0;
  display: grid;
  gap: 5px;
  min-width: 0;
  padding: 112px 18px 18px;
  background:
    linear-gradient(180deg, transparent 0%, rgba(255, 251, 244, 0.52) 36%, rgba(255, 251, 244, 0.98) 76%),
    linear-gradient(90deg, color-mix(in srgb, var(--accent), transparent 92%), transparent);
}

.card-copy small {
  color: #9c7b4d;
  font-size: 0.78rem;
  font-weight: 700;
}

.card-copy strong {
  color: var(--accent);
  font-size: 0.96rem;
}

.card-copy span {
  margin-top: 10px;
  font-family: var(--serif);
  font-size: 1.2rem;
  font-weight: 700;
  line-height: 1.35;
  color: #2f2418;
  word-break: keep-all;
}

.card-copy em {
  display: -webkit-box;
  overflow: hidden;
  color: #76654f;
  font-size: 0.82rem;
  font-style: normal;
  line-height: 1.55;
  -webkit-box-orient: vertical;
  -webkit-line-clamp: 2;
  word-break: keep-all;
}

.detail-screen {
  position: relative;
  padding: 18px 20px 128px;
  background-image:
    linear-gradient(90deg, rgba(255, 248, 237, 0.97), rgba(255, 248, 237, 0.8), rgba(255, 248, 237, 0.96)),
    linear-gradient(180deg, rgba(255, 248, 237, 0.6), var(--bg) 380px),
    var(--detail-image);
  background-position: center top;
  background-size: cover;
  background-attachment: fixed;
}

.detail-bottom {
  position: fixed;
  z-index: 5;
  left: 50%;
  bottom: 18px;
  justify-content: space-between;
  gap: 12px;
  width: min(920px, calc(100% - 40px));
  margin: 0;
  padding: 10px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: rgba(255, 253, 247, 0.86);
  box-shadow: var(--shadow);
  transform: translateX(-50%);
  backdrop-filter: blur(16px);
}

.detail-nav {
  gap: 10px;
  color: var(--muted);
  font-weight: 800;
}

.icon-button,
.text-button,
.chip {
  border: 1px solid var(--line);
  color: var(--ink);
  background: rgba(255, 255, 255, 0.56);
  transition:
    transform 160ms ease,
    border-color 160ms ease,
    background 160ms ease;
}

.icon-button {
  display: grid;
  place-items: center;
  width: 40px;
  height: 40px;
  border-radius: var(--radius);
}

.text-button {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  min-height: 40px;
  padding: 0 14px;
  border-radius: var(--radius);
  color: #765021;
  white-space: nowrap;
}

.text-button.complete.done {
  border-color: color-mix(in srgb, var(--accent), transparent 20%);
  color: #ffffff;
  background: var(--accent);
}

.icon-button:hover,
.text-button:hover,
.chip:hover {
  border-color: var(--ring);
  background: rgba(255, 255, 255, 0.84);
  transform: translateY(-1px);
}

.detail-layout {
  display: grid;
  grid-template-columns: minmax(0, 1.1fr) minmax(320px, 0.68fr);
  gap: 16px;
  width: min(1480px, 100%);
  margin: 0 auto;
}

.detail-card,
.journal-card {
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.72), rgba(255, 250, 242, 0.92)),
    rgba(255, 253, 247, 0.88);
  box-shadow: var(--shadow);
  backdrop-filter: blur(14px);
}

.detail-card {
  padding: clamp(22px, 3vw, 36px);
}

.day-pill {
  display: inline-flex;
  margin: 0 0 12px;
  color: var(--accent);
}

.detail-card h1 {
  margin: 0 0 16px;
  font-family: var(--serif);
  font-size: clamp(2.3rem, 4vw, 4.8rem);
  font-weight: 500;
  line-height: 1.12;
  word-break: keep-all;
}

.lead {
  max-width: 780px;
  margin: 0 0 24px;
  color: var(--muted);
  line-height: 1.85;
}

.verse-block {
  margin: 0 0 22px;
  padding: 24px;
  border-left: 3px solid var(--accent);
  background: rgba(255, 243, 222, 0.72);
}

.verse-block span,
.reflection-grid span {
  display: block;
  margin-bottom: 10px;
}

.verse-block p {
  margin: 0;
  font-family: var(--serif);
  font-size: clamp(1.45rem, 2.2vw, 2.25rem);
  line-height: 1.55;
  word-break: keep-all;
}

.verse-block small {
  display: block;
  margin-top: 12px;
  color: var(--muted);
}

.reflection-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 14px;
}

.reflection-grid > div,
.prayer-line {
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: rgba(255, 255, 255, 0.54);
  padding: 18px;
}

.reflection-grid p,
.prayer-line p {
  margin: 0;
  color: #493826;
  line-height: 1.75;
  word-break: keep-all;
}

.prayer-line {
  gap: 12px;
  margin-top: 14px;
  color: var(--accent);
}

.prayer-line svg {
  flex: 0 0 auto;
}

.journal-card {
  align-self: start;
  padding: 22px;
}

.journal-head {
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 16px;
}

.journal-head p {
  margin: 0;
}

.journal-head span {
  color: var(--muted);
  font-size: 0.78rem;
}

.chip-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 14px;
}

.chip {
  min-height: 36px;
  border-radius: 999px;
  padding: 0 13px;
  color: #765021;
}

textarea {
  width: 100%;
  min-height: 244px;
  resize: vertical;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 16px;
  color: var(--ink);
  background: rgba(255, 255, 255, 0.66);
  line-height: 1.7;
  outline: none;
}

textarea:focus {
  border-color: var(--ring);
  box-shadow: 0 0 0 4px rgba(199, 144, 45, 0.1);
}

@keyframes pageIn {
  from {
    opacity: 0;
    transform: translateY(12px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes openIn {
  from {
    opacity: 0;
    transform: translateY(28px) scale(0.985);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

@keyframes backIn {
  from {
    opacity: 0;
    transform: translateY(-14px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes slideLeftIn {
  from {
    opacity: 0;
    transform: translateX(28px);
  }
  to {
    opacity: 1;
    transform: translateX(0);
  }
}

@keyframes slideRightIn {
  from {
    opacity: 0;
    transform: translateX(-28px);
  }
  to {
    opacity: 1;
    transform: translateX(0);
  }
}

@media (max-width: 1020px) {
  .card-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .detail-layout {
    grid-template-columns: 1fr;
  }

}

@media (max-width: 680px) {
  .hero {
    min-height: 260px;
    padding: 18px 16px 34px;
  }

  .hero-copy {
    width: min(362px, 100%);
    margin-left: 0;
  }

  .hero h1 {
    max-width: 100%;
    font-size: 2.78rem;
    line-height: 1.08;
  }

  .passage {
    margin-bottom: 26px;
  }

  .hero-progress {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    width: min(100%, calc(100vw - 32px));
    gap: 12px;
  }

  .journey {
    width: min(362px, calc(100% - 28px));
    margin-left: 14px;
    margin-right: auto;
    padding-top: 34px;
  }

  .card-grid,
  .reflection-grid {
    grid-template-columns: 1fr;
  }

  .day-card {
    min-height: 248px;
  }

  .detail-screen {
    padding: 12px 14px 112px;
    overflow: hidden;
  }

  .detail-layout {
    width: min(362px, 100%);
    margin-left: 0;
    margin-right: auto;
  }

  .detail-bottom {
    left: 14px;
    right: 14px;
    align-items: stretch;
    flex-wrap: wrap;
    width: auto;
    bottom: 12px;
    padding: 8px;
    transform: none;
  }

  .detail-bottom > .text-button {
    flex: 1 1 auto;
    justify-content: center;
  }

  .detail-nav {
    order: 3;
    justify-content: center;
    width: 100%;
  }

  .detail-card,
  .journal-card {
    padding: 18px;
  }

  .detail-card h1 {
    font-size: 1.74rem;
    line-height: 1.28;
  }

  .verse-block p {
    font-size: 1.32rem;
    line-height: 1.62;
  }

  .verse-block {
    padding: 18px;
  }
}

    </style>
  </head>

      prayer: "성령님, 제 눈을 열어 규정 뒤에 가려진 사람의 아픔과 필요를 보게 하옵소서.",
      action: "오늘 만나는 사람 중 한 명의 필요를 살피고, 작지만 실제적인 도움을 선택합니다.",
      prompts: [

      action: "오늘 들은 말씀 중 즉시 순종할 수 있는 한 가지를 정하고 실행합니다.",

    {

      passage: "누가복음 6장 7-13절",
      verse: "너희는 나를 불러 주여 주여 하면서도 어찌하여 내가 말하는 것을 행하지 아니하느냐",
      reading: "지식의 홍수 속에서 더 좋은 말만 찾는 것으로는 충분하지 않습니다. 성령의 사람은 주께 나아와 말씀을 듣고, 그 말씀을 삶으로 준행합니다.",
      prayer: "주님, 제 삶이 말과 지식에 머물지 않고 순종으로 주님을 드러내게 하옵소서.",
      action: "이번 주 묵상 중 가장 붙들 말씀 하나를 정하고 다음 주 실천 계획을 한 줄로 적습니다.",
      prompts: [
        "이번 주 내가 실제 삶으로 옮겨야 할 주님의 말씀은 무엇인가요?",
        "주께 나아가기",
        "실천 계획",
        "다음 주 순종"
      ]
    }
  ]
};


const devotions = weeklyContent.days;
const storageKey = `personal-devotion-${weeklyContent.weekId}`;

document.title = `${weeklyContent.themeTitle} | 매일 말씀 묵상`;

const mediaThemes = [
  {
    id: "renewal",
    image: "./assets/devotion/warm-open-bible.png",
    accent: "#317b65",
    keywords: ["새 사람", "새롭게", "낡은", "벗고", "입다", "회개", "변화"]
  },
  {
    id: "grace",
    image: "./assets/devotion/warm-notebook.png",
    accent: "#b66550",
    keywords: ["은혜의 눈", "은혜", "사랑", "긍휼", "축복", "용서", "평안", "환영", "관계"]
  },
  {
    id: "word",
    image: "./assets/devotion/warm-pages.png",
    accent: "#4f7fa8",
    keywords: ["말씀", "생명", "믿음", "복음", "진리", "포도주", "본문", "호흡"]
  },
  {
    id: "prayer",
    image: "./assets/devotion/warm-candle.png",
    accent: "#8b689d",
    keywords: ["기도", "입술", "증인", "고백", "두려움", "담대", "충만", "예배"]
  },
  {
    id: "guidance",
    image: "./assets/devotion/warm-meadow.png",
    accent: "#4d8a55",
    keywords: ["새 부대", "길", "인도", "순종", "결정", "겸손", "부대", "유연", "고집"]
  },
  {
    id: "gratitude",
    image: "./assets/devotion/warm-wheat.png",
    accent: "#b77716",
    keywords: ["감사", "찬양", "열매", "은혜를 표시", "새 일", "가정", "교회", "지도"]
  }
];

const icons = {
  book:
    '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 19.5V5.75A2.75 2.75 0 0 1 6.75 3H20v16H6.75A2.75 2.75 0 0 0 4 21.75"/><path d="M8 7h8M8 11h7"/></svg>',
  check:
    '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 6 9 17l-5-5"/></svg>',
  chevronLeft:
    '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg>',
  chevronRight:
    '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg>',
  list:
    '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 6h13M8 12h13M8 18h13"/><path d="M3 6h.01M3 12h.01M3 18h.01"/></svg>',
  heart:
    '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8Z"/></svg>'
};

const $app = document.querySelector("#app");
const saved = readState();
const dayParam = new URLSearchParams(location.search).get("day");
const queryDay = dayParam === null ? NaN : Number(dayParam);
const hasQueryDay = Number.isInteger(queryDay) && queryDay >= 0 && queryDay < devotions.length;

const state = {
  selected: hasQueryDay ? queryDay : Number.isInteger(saved.selected) ? saved.selected : 0,
  view: hasQueryDay ? "detail" : "list",
  completed: new Set(saved.completed || []),
  entries: saved.entries || {}
};

function readState() {
  try {
    return JSON.parse(localStorage.getItem(storageKey)) || {};
  } catch {
    return {};
  }
}

function persist() {
  localStorage.setItem(
    storageKey,
    JSON.stringify({
      selected: state.selected,
      completed: [...state.completed],
      entries: state.entries
    })
  );
}

function icon(name) {
  return icons[name] || "";
}

function themeText(devotion) {
  return [
    devotion.title,
    devotion.subtitle,
    devotion.reference,
    devotion.verse,
    devotion.reading,
    devotion.prayer,
    devotion.action,
    ...(devotion.prompts || [])
  ].join(" ");
}

function scoreTheme(text, theme) {
  return theme.keywords.reduce((score, keyword) => {
    if (!text.includes(keyword)) return score;
    return score + Math.max(2, Math.min(keyword.length, 6));
  }, 0);
}

function autoMediaFor(devotion, index = 0) {
  const text = themeText(devotion);
  const [best] = mediaThemes
    .map((theme) => ({ theme, score: scoreTheme(text, theme) }))
    .sort((left, right) => right.score - left.score);

  const fallback = best && best.score > 0 ? best.theme : mediaThemes[index % mediaThemes.length];

  return {
    ...fallback,
    image: devotion.image || fallback.image,
    accent: devotion.accent || fallback.accent
  };
}

function metaFor(devotion, index = devotions.indexOf(devotion)) {
  const [date = "", navTitle = "말씀 묵상"] = devotion.subtitle.split(" · ");
  return {
    date,
    navTitle,
    media: autoMediaFor(devotion, Math.max(0, index))
  };
}

function excerpt(text) {
  return text.length > 44 ? `${text.slice(0, 44)}...` : text;
}

function render(transition = "fade") {
  const devotion = devotions[state.selected];
  const meta = metaFor(devotion);
  const completeCount = devotions.filter((item) => state.completed.has(item.id)).length;
  const progress = Math.round((completeCount / devotions.length) * 100);

  $app.innerHTML =
    state.view === "detail"
      ? renderDetail(devotion, meta, completeCount, transition)
      : renderList(completeCount, progress, transition);
}

function renderList(completeCount, progress, transition) {
  const heroMedia = autoMediaFor(devotions[0], 0);

  return `
    <section class="screen list-screen ${transition}">
      <header class="hero" style="--hero-image: url('${heroMedia.image}')">
        <div class="hero-copy">
          <p class="sermon-date">${weeklyContent.sermonDate}</p>
          <h1>${weeklyContent.themeTitle}</h1>
          <p class="passage">${weeklyContent.passage}</p>
          <div class="hero-progress" aria-label="묵상 완료율">
            <div class="progress-track"><span style="width: ${progress}%"></span></div>
            <strong>${completeCount} / ${devotions.length} 완료</strong>
          </div>
        </div>
      </header>

      <main class="journey" aria-labelledby="journey-title">
        <div class="section-heading">
          <p id="journey-title">${weeklyContent.journeyTitle}</p>
        </div>
        <div class="card-grid">
          ${devotions
            .map((item, index) => renderDayCard(item, index))
            .join("")}
        </div>
      </main>
    </section>
  `;
}

function renderDayCard(item, index) {
  const meta = metaFor(item, index);
  const isDone = state.completed.has(item.id);

  return `
    <button
      class="day-card ${isDone ? "done" : ""}"
      style="--image: url('${meta.media.image}'); --accent: ${meta.media.accent}"
      data-open="${index}"
      type="button"
    >
      ${isDone ? `<span class="check-badge">${icon("check")}</span>` : ""}
      <span class="card-copy">
        <small>${meta.date}</small>
        <strong>${meta.navTitle}</strong>
        <span>${item.title}</span>
        <em>${excerpt(item.reading)}</em>
      </span>
    </button>
  `;
}

function renderDetail(devotion, meta, completeCount, transition) {
  const journal = state.entries[devotion.id] || "";
  const isDone = state.completed.has(devotion.id);

  return `
    <section class="screen detail-screen ${transition}" style="--accent: ${meta.media.accent}; --detail-image: url('${meta.media.image}')">
      <main class="detail-layout">
        <article class="detail-card">
          <p class="sermon-date">${weeklyContent.themeTitle}</p>
          <p class="day-pill">${meta.date} · ${meta.navTitle}</p>
          <h1>${devotion.title}</h1>
          <p class="lead">${devotion.reading}</p>

          <div class="verse-block">
            <span>오늘 붙들 말씀 · ${devotion.reference}</span>
            <p>“${devotion.verse}”</p>
            <small>${devotion.passage}</small>
          </div>

          <div class="reflection-grid">
            <div>
              <span>생각할 질문</span>
              <p>${devotion.prompts[0]}</p>
            </div>
            <div>
              <span>오늘의 한 가지 적용</span>
              <p>${devotion.action}</p>
            </div>
          </div>

          <div class="prayer-line">
            ${icon("heart")}
            <p>${devotion.prayer}</p>
          </div>
        </article>

        <aside class="journal-card">
          <div class="journal-head">
            <p>묵상 기록</p>
            <span>기록은 이 기기에만 저장됩니다</span>
          </div>
          <div class="chip-row">
            ${devotion.prompts.slice(1).map((prompt, index) => `<button class="chip" data-prompt-index="${index}" type="button">${prompt}</button>`).join("")}
          </div>
          <textarea id="journal-entry" placeholder="오늘 받은 마음, 적용할 한 문장, 기도 제목을 적어보세요.">${journal}</textarea>
        </aside>
      </main>

      <footer class="detail-bottom">
        <button class="text-button" data-action="list" type="button">${icon("list")} 목록</button>
        <div class="detail-nav" aria-label="묵상 이동">
          <button class="icon-button" data-action="previous" type="button" aria-label="이전 묵상">${icon("chevronLeft")}</button>
          <span>${state.selected + 1} / ${devotions.length}</span>
          <button class="icon-button" data-action="next" type="button" aria-label="다음 묵상">${icon("chevronRight")}</button>
        </div>
        <button class="text-button complete ${isDone ? "done" : ""}" data-action="complete-day" type="button">
          ${icon("check")} ${isDone ? "묵상 완료됨" : "묵상 완료"}
        </button>
      </footer>
    </section>
  `;
}

function openDetail(index, transition = "open") {
  state.selected = (index + devotions.length) % devotions.length;
  state.view = "detail";
  persist();
  render(transition);
}

function openList() {
  state.view = "list";
  persist();
  render("back");
}

function moveDetail(direction) {
  openDetail(state.selected + direction, direction > 0 ? "slide-left" : "slide-right");
}

$app.addEventListener("click", (event) => {
  const button = event.target.closest("button");
  if (!button) return;

  if (button.dataset.open) openDetail(Number(button.dataset.open));
  if (button.dataset.jump) openDetail(Number(button.dataset.jump), "fade");
  if (button.dataset.action === "list") openList();
  if (button.dataset.action === "previous") moveDetail(-1);
  if (button.dataset.action === "next") moveDetail(1);
  if (button.dataset.action === "complete-day") {
    const id = devotions[state.selected].id;
    if (state.completed.has(id)) state.completed.delete(id);
    else state.completed.add(id);
    persist();
    render("fade");
  }
  if (button.dataset.promptIndex) {
    const devotion = devotions[state.selected];
    const prompt = devotion.prompts[Number(button.dataset.promptIndex) + 1];
    const current = state.entries[devotion.id] || "";
    state.entries[devotion.id] = current.includes(prompt) ? current : `${current}${current ? "\n" : ""}${prompt}`;
    persist();
    render("fade");
    document.querySelector("#journal-entry")?.focus();
  }
});

$app.addEventListener("input", (event) => {
  if (event.target.id !== "journal-entry") return;

  const devotion = devotions[state.selected];
  state.entries[devotion.id] = event.target.value;
  persist();
});

render();

    </script>
  </body>
</html>
